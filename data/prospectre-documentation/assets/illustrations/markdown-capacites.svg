<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Capacités Markdown dans PROSPECTRE</title>
  <desc id="desc">Le front matter structure le graphe et le corps Markdown fournit le contenu riche.</desc>
  <rect width="1200" height="520" rx="28" fill="#071015"/>
  <text x="60" y="68" fill="#edf7f6" font-family="Arial, sans-serif" font-size="34" font-weight="700">Une fiche, deux couches complémentaires</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="120" width="450" height="330" rx="18" fill="#14242b" stroke="#9b6be8" stroke-width="3"/>
    <text x="105" y="168" fill="#c4b5fd" font-size="24" font-weight="700">Front matter YAML</text>
    <text x="105" y="210" fill="#edf7f6" font-size="18">id: identifiant stable</text><text x="105" y="244" fill="#edf7f6" font-size="18">type: famille de nœud</text>
    <text x="105" y="278" fill="#edf7f6" font-size="18">titre: nom affiché</text><text x="105" y="312" fill="#edf7f6" font-size="18">relations: liens du graphe</text>
    <text x="105" y="366" fill="#a7f3d0" font-size="17">Structure, filtres, navigation</text>
    <rect x="680" y="120" width="450" height="330" rx="18" fill="#14242b" stroke="#4f8cff" stroke-width="3"/>
    <text x="715" y="168" fill="#7dd3fc" font-size="24" font-weight="700">Corps Markdown</text>
    <text x="715" y="210" fill="#edf7f6" font-size="18">titres, listes et citations</text><text x="715" y="244" fill="#edf7f6" font-size="18">tableaux et blocs de code</text>
    <text x="715" y="278" fill="#edf7f6" font-size="18">liens et images locales</text><text x="715" y="312" fill="#edf7f6" font-size="18">contenu éditorial détaillé</text>
    <text x="715" y="366" fill="#a7f3d0" font-size="17">Lecture, transmission, démonstration</text>
    <path d="M535 285H665" stroke="#71868d" stroke-width="5"/><text x="600" y="265" fill="#9fb3b8" font-size="16" text-anchor="middle">forme une fiche</text>
  </g>
</svg>
