<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">Cycle de vie d'un pack</title>
  <desc id="desc">Concevoir, valider, publier, utiliser, enrichir et archiver.</desc>
  <rect width="1200" height="480" rx="28" fill="#071015"/>
  <text x="60" y="70" fill="#edf7f6" font-family="Arial, sans-serif" font-size="34" font-weight="700">Cycle de vie d’un pack</text>
  <g transform="translate(600 265)" font-family="Arial, sans-serif" text-anchor="middle">
    <circle r="90" fill="#14242b" stroke="#7dd3fc" stroke-width="4"/>
    <text y="-8" fill="#edf7f6" font-size="24" font-weight="700">Projet</text><text y="24" fill="#a7f3d0" font-size="17">versionné</text>
    <g fill="#14242b" stroke-width="3">
      <rect x="-500" y="-55" width="170" height="110" rx="16" stroke="#4f8cff"/><rect x="-280" y="-190" width="170" height="110" rx="16" stroke="#6fb85f"/>
      <rect x="110" y="-190" width="170" height="110" rx="16" stroke="#9b6be8"/><rect x="330" y="-55" width="170" height="110" rx="16" stroke="#e5534b"/>
      <rect x="110" y="105" width="170" height="110" rx="16" stroke="#e0a336"/><rect x="-280" y="105" width="170" height="110" rx="16" stroke="#7dd3fc"/>
    </g>
    <g fill="#edf7f6" font-size="18" font-weight="700">
      <text x="-415" y="6">1. Concevoir</text><text x="-195" y="-128">2. Valider</text><text x="195" y="-128">3. Publier</text>
      <text x="415" y="6">4. Utiliser</text><text x="195" y="168">5. Enrichir</text><text x="-195" y="168">6. Archiver</text>
    </g>
  </g>
</svg>
