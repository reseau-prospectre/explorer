<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Parcours utilisateur PROSPECTRE</title>
  <desc id="desc">Cinq étapes : charger, explorer, sélectionner, enrichir et exporter.</desc>
  <rect width="1200" height="420" rx="28" fill="#071015"/>
  <text x="60" y="72" fill="#edf7f6" font-family="Arial, sans-serif" font-size="34" font-weight="700">Du pack au projet partagé</text>
  <text x="60" y="108" fill="#9fb3b8" font-family="Arial, sans-serif" font-size="18">Le flux principal de travail dans PROSPECTRE</text>
  <path d="M180 240H1020" stroke="#31515d" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(160 240)"><circle r="62" fill="#102a38" stroke="#7dd3fc" stroke-width="4"/><text y="-5" fill="#edf7f6" font-size="20" font-weight="700">1. Charger</text><text y="24" fill="#9fb3b8" font-size="15">ZIP ou Markdown</text></g>
    <g transform="translate(380 240)"><circle r="62" fill="#1b263e" stroke="#4f8cff" stroke-width="4"/><text y="-5" fill="#edf7f6" font-size="20" font-weight="700">2. Explorer</text><text y="24" fill="#9fb3b8" font-size="15">graphe et filtres</text></g>
    <g transform="translate(600 240)"><circle r="62" fill="#193124" stroke="#6fb85f" stroke-width="4"/><text y="-5" fill="#edf7f6" font-size="20" font-weight="700">3. Lire</text><text y="24" fill="#9fb3b8" font-size="15">fiches et relations</text></g>
    <g transform="translate(820 240)"><circle r="62" fill="#2b2040" stroke="#9b6be8" stroke-width="4"/><text y="-5" fill="#edf7f6" font-size="20" font-weight="700">4. Enrichir</text><text y="24" fill="#9fb3b8" font-size="15">éditer et discuter</text></g>
    <g transform="translate(1040 240)"><circle r="62" fill="#3a1e1d" stroke="#e5534b" stroke-width="4"/><text y="-5" fill="#edf7f6" font-size="20" font-weight="700">5. Exporter</text><text y="24" fill="#9fb3b8" font-size="15">fiche ou projet</text></g>
  </g>
  <text x="600" y="370" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Les contenus restent portables : Markdown + YAML + assets</text>
</svg>
